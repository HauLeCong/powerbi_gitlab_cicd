stages:
  - build
  - deploy

variables:
  FABRIC_CONFIG: "config.yml"
  FABRIC_GIT_COMPARE_REF: $CI_DEFAULT_BRANCH
  # Full history so get_changed_items() can diff against the default branch
  GIT_DEPTH: "0"
  DOCKER_TLS_CERTDIR: "/certs"

# Promotion: MR → DEV, main → PPE, tag → PROD
# Feature-branch pushes only run after you open an MR targeting main.
workflow:
  rules:
    - if: $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == $CI_DEFAULT_BRANCH && $CI_PIPELINE_SOURCE == "merge_request_event"
      variables:
        FABRIC_ENVIRONMENT: DEV
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      variables:
        FABRIC_ENVIRONMENT: PPE
    - if: $CI_COMMIT_TAG
      variables:
        FABRIC_ENVIRONMENT: PROD
    - when: never

build:image:
  stage: build
  image: docker:24
  services:
    - docker:24-dind
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Dockerfile
        - .dockerignore
        - pyproject.toml
        - src/**/*
        - .gitlab-ci.yml
    - if: $CI_OPEN_MERGE_REQUESTS
      changes:
        - Dockerfile
        - .dockerignore
        - pyproject.toml
        - src/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - Dockerfile
        - .dockerignore
        - pyproject.toml
        - src/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_TAG
      changes:
        - Dockerfile
        - .dockerignore
        - pyproject.toml
        - src/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
      allow_failure: true
    - if: $CI_COMMIT_TAG
      when: manual
      allow_failure: true
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - docker build -t "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA" -t "$CI_REGISTRY_IMAGE:latest" .
    - docker push "$CI_REGISTRY_IMAGE:$CI_COMMIT_SHA"
    - docker push "$CI_REGISTRY_IMAGE:latest"

deploy:fabric:
  stage: deploy
  image: $CI_REGISTRY_IMAGE:latest
  needs:
    - job: build:image
      optional: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_OPEN_MERGE_REQUESTS
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG
  script:
    - test -n "$AZURE_CLIENT_ID" && test -n "$AZURE_CLIENT_SECRET" && test -n "$AZURE_TENANT_ID"
    - echo "Deploying to FABRIC_ENVIRONMENT=$FABRIC_ENVIRONMENT"
    - python scripts/deploy.py
  artifacts:
    when: always
    paths:
      - fabric_cicd.error.log
